name: ForgeProof Verify
description: >-
  Verify ForgeProof .rpack provenance bundles (Ed25519-signed audit trails
  for AI-generated code) on pull requests.
author: Ryan Michie
branding:
  icon: shield
  color: green

inputs:
  bundle:
    description: >-
      Glob for .rpack bundles, relative to project-root. Every matched
      bundle must verify.
    default: ".forgeproof/*.rpack"
  strict:
    description: >-
      When "true", missing evidence (provenance chain or recorded
      artifacts not present in the checkout) fails verification, not just
      tampered evidence.
    default: "true"
  require-bundle:
    description: >-
      When "true", the check fails if no bundle matches the glob.
    default: "true"
  comment:
    description: >-
      When "true", post the verification report as a PR comment on
      pull_request events. Comment failures (e.g. read-only token on a
      fork PR) never fail the check — the report is always in the job
      summary.
    default: "true"
  project-root:
    description: >-
      Directory the bundle glob and recorded artifact paths anchor to.
    default: "."
  github-token:
    description: >-
      Token used to post the PR comment. Needs pull-requests write
      permission; not needed when comment is "false".
    default: ${{ github.token }}

outputs:
  verified:
    description: >-
      "true" iff every matched bundle verified (with no bundle matched and
      require-bundle "false", this is vacuously "true").
    value: ${{ steps.verify.outputs.verified }}
  complete:
    description: >-
      "true" iff every matched bundle was complete — provenance chain and
      all recorded artifacts present alongside the bundle.
    value: ${{ steps.verify.outputs.complete }}
  bundle-path:
    description: First matched bundle path, relative to project-root.
    value: ${{ steps.verify.outputs.bundle-path }}
  report:
    description: >-
      The markdown verification report. Ends with the hidden
      "<!-- forgeproof-verify -->" marker used for PR-comment upsert.
    value: ${{ steps.verify.outputs.report }}
  should-fail:
    description: >-
      "true" iff the enforce step fails the check — i.e. a bundle failed
      verification, or no bundle matched while require-bundle is "true".
    value: ${{ steps.verify.outputs.should-fail }}
  summary-bytes:
    description: >-
      Number of bytes the verify step appended to the job summary
      (always > 0 when the step ran inside GitHub Actions).
    value: ${{ steps.verify.outputs.summary-bytes }}

runs:
  using: composite
  steps:
    # Never fails: writes outputs (verified/complete/bundle-path/report/
    # should-fail/summary-bytes) and the job summary so the report reaches
    # the user even when the check must go red. The enforce step at the
    # end turns should-fail into the actual red X.
    - id: verify
      shell: bash
      env:
        INPUT_BUNDLE: ${{ inputs.bundle }}
        INPUT_STRICT: ${{ inputs.strict }}
        INPUT_REQUIRE_BUNDLE: ${{ inputs.require-bundle }}
        INPUT_PROJECT_ROOT: ${{ inputs.project-root }}
      run: |
        PY=$(command -v python3 || command -v python)
        export VERIFIER="$GITHUB_ACTION_PATH/verifier/forgeproof.py"
        "$PY" "$GITHUB_ACTION_PATH/scripts/run_verify.py"

    # Failure tolerated by design: on fork PRs the default token is
    # read-only and the comment API returns 403 — the check result and the
    # job-summary report must still land.
    - name: Post report as PR comment
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPORT: ${{ steps.verify.outputs.report }}
      run: |
        set +e
        body_file=$(mktemp)
        printf '%s\n' "$REPORT" > "$body_file"
        # Marker-based upsert: find our previous report comment (hidden
        # marker in the body AND authored by this token's identity) and
        # edit it in place; otherwise post a new comment. gh's --edit-last
        # is NOT used — it targets the token's last comment of any kind
        # and would clobber an unrelated bot comment.
        #
        # Why GraphQL + viewerDidAuthor (history: the first upsert
        # implementation never matched): it resolved the author with
        # login=$(gh api user --jq .login 2>/dev/null), but installation
        # tokens get HTTP 403 from /user and gh prints the error-response
        # JSON body to STDOUT — so $login captured a quote-riddled JSON
        # blob instead of being empty, the [ -n "$login" ] fallback never
        # fired, and interpolating that blob into the jq filter made it a
        # silent syntax error (stderr was suppressed too). Every run then
        # posted a fresh comment. This version has no /user call and no
        # shell interpolation into the query or filter: viewerDidAuthor
        # asks the API directly "did this token's identity write it", and
        # the marker is a literal inside the jq program. stderr stays
        # visible and the candidate count is logged so the upsert
        # decision is auditable in the step log. Comments beyond the most
        # recent 100 are not searched — worst case a new comment is
        # posted, which is then the most recent.
        owner="${GITHUB_REPOSITORY%%/*}"
        name="${GITHUB_REPOSITORY#*/}"
        ids=$(gh api graphql \
          -f owner="$owner" -f name="$name" -F pr="$PR_NUMBER" \
          -f query='query($owner: String!, $name: String!, $pr: Int!) {
            repository(owner: $owner, name: $name) {
              pullRequest(number: $pr) {
                comments(last: 100) {
                  nodes { id body viewerDidAuthor }
                }
              }
            }
          }' \
          --jq '.data.repository.pullRequest.comments.nodes[]
                | select(.viewerDidAuthor
                         and (.body | contains("<!-- forgeproof-verify -->")))
                | .id')
        count=$(printf '%s\n' "$ids" | grep -c .)
        comment_id=$(printf '%s\n' "$ids" | tail -n 1)
        echo "forgeproof-verify: comment upsert: $count candidate comment(s) found"
        if [ -n "$comment_id" ]; then
          if gh api graphql \
               -f id="$comment_id" -F body=@"$body_file" \
               -f query='mutation($id: ID!, $body: String!) {
                 updateIssueComment(input: {id: $id, body: $body}) {
                   issueComment { url }
                 }
               }' > /dev/null; then
            echo "forgeproof-verify: updated existing report comment $comment_id"
            exit 0
          fi
          echo "forgeproof-verify: updating comment $comment_id failed; posting a new comment instead"
        fi
        if gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
             --body-file "$body_file"; then
          echo "forgeproof-verify: posted new report comment"
          exit 0
        fi
        echo "::notice::forgeproof-verify: comment skipped (likely read-only token on a fork PR) — report is in the job summary"
        exit 0

    - id: enforce
      shell: bash
      env:
        SHOULD_FAIL: ${{ steps.verify.outputs.should-fail }}
      run: |
        # Fail-closed shape: only an explicit "false" passes. An empty,
        # missing, or mangled output must read as red, even if composite
        # step-abort semantics ever change.
        if [ "$SHOULD_FAIL" != "false" ]; then
          echo "::error::ForgeProof verification failed (should-fail='$SHOULD_FAIL') — see the job summary (and PR comment) for the audit report"
          exit 1
        fi
        echo "forgeproof-verify: enforcement passed"
